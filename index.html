<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  #gate {
    background: white;
    border-radius: 12px;
    padding: 48px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    max-width: 380px;
    width: 90%;
  }
  #gate input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #DCE1E6;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
    text-align: center;
  }
  #gate input:focus { border-color: #333; }
  #gate button {
    width: 100%;
    padding: 12px;
    background: #333;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s;
  }
  #gate button:hover { background: #555; }
  #error { color: #C0392B; font-size: 0.8rem; margin-top: 8px; display: none; }
</style>
</head>

  <input type="password" id="pw" placeholder="Enter access code" autofocus onkeydown="if(event.key==='Enter')unlock()">

</div>

async function sha256(m){
  const e=new TextEncoder().encode(m);
  const h=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function b64decode(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}
async function unlock(){
  const p=document.getElementById("pw").value;
  const h=await sha256(p);
  if(h===H){
    const html=b64decode(D);
    document.open();
    document.write(html);
    document.close();
  } else {
    document.getElementById("error").style.display="block";
    document.getElementById("pw").value="";
    document.getElementById("pw").focus();
  }
}
