<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Segoe UI", Calibri, Arial, sans-serif; background: #0F1923; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  #gate {
    background: white;
    border-radius: 12px;
    padding: 48px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    max-width: 380px;
    width: 90%;
  }
  #gate input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #DCE1E6;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
    text-align: center;
  }
  #gate input:focus { border-color: #333; }
  #gate button {
    width: 100%;
    padding: 12px;
    background: #333;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s;
  }
  #gate button:hover { background: #555; }
  #error { color: #C0392B; font-size: 0.8rem; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div id="gate">
  <input type="password" id="pw" placeholder="Enter access code" autofocus onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Continue</button>
  <div id="error">Incorrect</div>
</div>

async function sha256(m){const e=new TextEncoder().encode(m);const h=await crypto.subtle.digest("SHA-256",e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");}
function decompress(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream("deflate");
  const writer=ds.writable.getWriter();
  writer.write(bytes.slice(2));
  writer.close();
  return new Response(ds.readable).text();
}
